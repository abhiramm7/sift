<tr id="row-{{ p.id }}">
  <td class="cell-title">
    <details>
      <summary>
        <a href="/paper/{{ p.id }}">{{ p.title }}</a>
        {% if p.authors %}<span class="row-authors">{{ p.authors[:3] | join(', ') }}{% if p.authors|length > 3 %} et al.{% endif %}</span>{% endif %}
      </summary>
      <form
        class="inline-form"
        hx-post="/manage/title/{{ p.id }}"
        hx-target="#row-{{ p.id }}"
        hx-swap="outerHTML">
        <input type="text" name="title" value="{{ p.title }}" class="mono-input">
        <button type="submit">Rename</button>
      </form>
    </details>
  </td>
  <td class="cell-year">{{ p.year or '—' }}</td>
  <td class="cell-pages">{{ p.pages or '—' }}</td>
  <td class="cell-kind">
    <form
      hx-post="/manage/kind/{{ p.id }}"
      hx-target="#row-{{ p.id }}"
      hx-swap="outerHTML"
      hx-trigger="change from:select">
      <select name="kind">
        <option value="paper" {{ 'selected' if p.kind == 'paper' else '' }}>paper</option>
        <option value="book" {{ 'selected' if p.kind == 'book' else '' }}>book</option>
        <option value="report" {{ 'selected' if p.kind == 'report' else '' }}>report</option>
      </select>
    </form>
  </td>
  <td class="cell-tags">
    <form
      class="inline-form"
      hx-post="/manage/tags/{{ p.id }}"
      hx-target="#row-{{ p.id }}"
      hx-swap="outerHTML">
      <input
        type="text"
        name="tags"
        value="{{ p.user_tags | join(', ') }}"
        placeholder="comma, separated"
        class="mono-input">
    </form>
  </td>
  <td class="cell-actions">
    <button
      class="danger"
      hx-post="/manage/delete/{{ p.id }}"
      hx-confirm="Delete {{ p.title }}? PDF, summary, figures, embeddings all go."
      hx-target="#row-{{ p.id }}"
      hx-swap="delete">Delete</button>
  </td>
</tr>
