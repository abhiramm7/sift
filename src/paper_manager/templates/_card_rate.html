<div class="card-rate" id="card-rate-{{ paper_id }}" data-state="{{ state }}">
  <button
    title="Like"
    class="card-rate-btn {{ 'active' if state == 'up' else '' }}"
    hx-post="/quick-rate/{{ paper_id }}"
    hx-vals='{"rating": {{ -1 if state == "up" else 1 }}}'
    hx-target="#card-rate-{{ paper_id }}"
    hx-swap="outerHTML"
    onclick="event.stopPropagation();">👍</button>
  <button
    title="Skip"
    class="card-rate-btn {{ 'active' if state == 'down' else '' }}"
    hx-post="/quick-rate/{{ paper_id }}"
    hx-vals='{"rating": {{ 0 if state == "down" else -1 }}}'
    hx-target="#card-rate-{{ paper_id }}"
    hx-swap="outerHTML"
    onclick="event.stopPropagation();">👎</button>
</div>
